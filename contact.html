<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us - Wanderlust</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar (Without Search Controls) -->
  <nav class="navbar">
    <div class="logo"><h2>Wanderlust</h2></div>
    <div class="nav-links">
      <a href="travel_recommendation.html">Home</a>
      <a href="about.html">About Us</a>
      <a href="contact.html">Contact Us</a>
    </div>
  </nav>

  <div class="content-wrapper">
    <h1>Get in Touch</h1>
    <p style="margin-bottom: 2rem; color: #64748b;">Have questions? Fill out the form below and our team will get back to you within 24 hours.</p>
    
    <form onsubmit="alert('Thank you for reaching out! We will contact you soon.'); return false;">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" required>
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" required>
      </div>
      <div class="form-group">
        <label for="message">Your Message</label>
        <textarea id="message" rows="5" required></textarea>
      </div>
      <button type="submit" class="btn btn-search">Submit Form</button>
    </form>
  </div>

</body>
</html>
